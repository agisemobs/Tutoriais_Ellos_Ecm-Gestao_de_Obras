<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Downloads Tutoriais - Contratante | Ellos ECM</title>
  <link rel="stylesheet" href="style.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Merriweather+Sans:ital,wght@0,800;1,800&family=Oswald:wght@200..700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>

  <div class="header">
    <img src="img/logo_prefeitura_contagem.jpg" alt="Prefeitura de Contagem" />
  </div>

  <div class="card">
    <h1>Downloads de Tutoriais</h1>
    <p>
      Selecione o documento desejado para realizar o download dos tutoriais e
      materiais de apoio do sistema.
    </p>

    <div class="select-group">
      <label for="arquivo">Documento disponível:</label>
      <select id="arquivo">
        <option value="">-- Selecione --</option>
        <option value="arquivos_pdf/contratada/TUTORIAL PARA LANÇAMENTO DE MEDIÇÃO.pdf">
          Lançamento de Medição.
        </option>
        <option value="arquivos_pdf/contratada/TUTORIAL PARA LANÇAMENTO DE DIÁRIO DE OBRA.pdf">
          Lançamento de Diário de Obra.
        </option>
        <option value="arquivos_pdf/contratada/TUTORIAL DE ASSINATURAS DIGITAIS ART.pdf">
          Assinaturas Digitais dos ART's.
        </option>
      </select>
    </div>

    <a href="#" class="btn-download" id="btn-baixar">Baixar PDF</a>

    <div class="footer">
      Prefeitura de Contagem • Sistema de Gestão de Obras
    </div>
  </div>

  <a href="index.html" class="btn-home">
    <i class="fa fa-home"></i> Página Inicial
  </a>

  <footer>
    Developed by Bruna Braga<br />
    Equipe AGI – Assessoria de Gestão e Inovação - Semobs / 2026.
  </footer>

  <script>
    document.getElementById('btn-baixar').addEventListener('click', function (e) {
      e.preventDefault();

      const select = document.getElementById('arquivo');
      const url = select.value;

      if (!url) {
        alert('Selecione um arquivo para download.');
        return;
      }

      const link = document.createElement('a');
      link.href = url;
      link.download = url.split('/').pop();
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });
  </script>

</body>
</html>
